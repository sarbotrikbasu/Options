services:
  - type: web
    name: nse-options-analytics-api
    runtime: python
    plan: free
    region: singapore

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11
